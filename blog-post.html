  <style>
    /* ナビゲーション（常にスクロール済みスタイル） */
    .blog-post-page .navbar {
      background: rgba(255,255,255,0.97);
      box-shadow: var(--shadow-sm);
      backdrop-filter: blur(12px);
    }
    .blog-post-page .nav-logo-img { filter: none; }
    .blog-post-page .nav-menu a { color: var(--text); }
    .blog-post-page .nav-menu a:hover { background: var(--gray-100); color: var(--primary); }
    .blog-post-page .nav-toggle span { background: var(--text); }

    .post-page-body {
      padding: 100px 0 80px;
      background: var(--gray-50);
      min-height: 70vh;
    }

    .post-container {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* パンくず */
    .post-breadcrumb {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--text-light);
      margin-bottom: 32px;
      overflow: hidden;
    }
    .post-breadcrumb a {
      color: var(--primary-light);
      text-decoration: none;
      white-space: nowrap;
    }
    .post-breadcrumb a:hover { text-decoration: underline; }
    .post-breadcrumb .bc-sep { opacity: 0.5; white-space: nowrap; flex-shrink: 0; }
    .post-breadcrumb .bc-title {
      opacity: 0.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    @media (max-width: 600px) {
      .post-breadcrumb .bc-title,
      .post-breadcrumb .bc-title-sep { display: none; }
    }

    /* サムネイル */
    .post-thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: var(--radius-lg);
      margin-bottom: 32px;
      box-shadow: var(--shadow-md);
    }

    /* メタ情報 */
    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    /* タイトル */
    .post-title {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 900;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 32px;
    }

    /* 本文 */
    .post-body-wrap {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 48px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--gray-200);
      line-height: 1.9;
      color: var(--text);
    }

    .post-body-wrap h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--primary);
      margin: 2em 0 0.8em;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--ocean-end);
    }
    .post-body-wrap h2:first-child { margin-top: 0; }

    .post-body-wrap h3 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin: 1.6em 0 0.6em;
    }

    .post-body-wrap p {
      margin-bottom: 1.2em;
    }

    .post-body-wrap ul, .post-body-wrap ol {
      padding-left: 1.5em;
      margin-bottom: 1.2em;
    }
    .post-body-wrap li { margin-bottom: 0.4em; }

    .post-body-wrap strong { color: var(--primary); }

    .post-body-wrap a {
      color: var(--primary-light);
      text-decoration: underline;
    }

    /* 戻るボタン */
    .post-back {
      margin-top: 48px;
      display: flex;
      gap: 12px;
    }

    /* ローディング */
    .post-loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .post-loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .post-not-found {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
    }
    .post-not-found h2 { font-size: 1.2rem; margin-bottom: 12px; }

    @media (max-width: 600px) {
      .post-body-wrap { padding: 28px 20px; }
      .post-title { font-size: 1.3rem; }
      .post-back {
        flex-direction: column;
        gap: 10px;
      }
      .post-back .btn,
      .post-back .btn-outline-dark {
        padding: 11px 20px;
        font-size: 0.88rem;
        text-align: center;
        justify-content: center;
        width: 100%;
        box-sizing: border-box;
      }
    }

<body class="blog-post-page">
  <!-- ナビゲーション -->

      <button class="nav-toggle" id="navToggle" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-menu" id="navMenu">
        <li><a href="index.html#service-ai">サービス</a></li>
        <li><a href="index.html#cases">導入事例</a></li>

      </ul>

  <div class="post-page-body">
    <div class="post-container" id="postContainer">
      <!-- ローディング表示 -->
      <div class="post-loading" id="postLoading">
        <div class="post-loading-spinner"></div>
        <p>記事を読み込んでいます...</p>
      </div>
    </div>
  </div>

  <!-- フッター -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-brand">
          <img src="RAIZONロゴ.png" alt="RAIZON - 沖縄のLINE構築・AI活用・DX支援" class="footer-logo-img">
          <p>デジタルで変える。<br>働き方も、仕組みも、売り方も。</p>
        </div>

          <p>沖縄県 | LINE・メール：24時間受付（年中無休） | 電話：9:00〜22:00（年中無休）</p>
        </div>

  <script src="blog.js"></script>
  <script>
    // モバイルメニュー
    document.getElementById('navToggle').addEventListener('click', () => {
      document.getElementById('navMenu').classList.toggle('active');
    });
    document.getElementById('navMenu').querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => document.getElementById('navMenu').classList.remove('active'));
    });

    // 記事を読み込んで表示
    (async function() {
      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      const container = document.getElementById('postContainer');

      if (!id) {
        container.innerHTML = `
          <div class="post-not-found">
            <h2>記事が見つかりません</h2>
            <p>URLが正しいか確認してください。</p>
            <div style="margin-top:24px;">
              <a href="blog-list.html" class="btn btn-primary">ブログ一覧に戻る</a>
            </div>
          </div>`;
        return;
      }

      const post = await BlogCMS.getPost(id);

      if (!post) {
        container.innerHTML = `
          <div class="post-not-found">
            <h2>記事が見つかりません</h2>
            <p>削除されたか、URLが正しくない可能性があります。</p>
            <div style="margin-top:24px;">
              <a href="blog-list.html" class="btn btn-primary">ブログ一覧に戻る</a>
            </div>
          </div>`;
        return;
      }

      // タイトルとOGPを動的設定
      const postUrl = `https://raizon-okinawa.com/blog-post?id=${id}`;
      const postDesc = BlogCMS.truncate(post.body, 120);
      const postImg = post.thumbnail || 'https://raizon-okinawa.com/seo-meo-thumb.webp';

      document.title = `${post.title} | RAIZON`;
      document.querySelector('meta[name="description"]').setAttribute('content', postDesc);
      document.querySelector('meta[property="og:title"]').setAttribute('content', `${post.title} | RAIZON`);
      document.querySelector('meta[property="og:description"]').setAttribute('content', postDesc);
      document.querySelector('meta[property="og:url"]').setAttribute('content', postUrl);
      document.querySelector('meta[property="og:image"]').setAttribute('content', postImg);
      document.querySelector('meta[name="twitter:title"]').setAttribute('content', `${post.title} | RAIZON`);
      document.querySelector('meta[name="twitter:description"]').setAttribute('content', postDesc);
      document.querySelector('link[rel="canonical"]').setAttribute('href', postUrl);

      // BlogPosting構造化データ（JSON-LD）を動的に注入
      const jsonLd = document.createElement('script');
      jsonLd.type = 'application/ld+json';
      jsonLd.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": post.title,
        "description": postDesc,
        "image": postImg,
        "datePublished": new Date(post.createdAt).toISOString(),
        "dateModified": new Date(post.updatedAt || post.createdAt).toISOString(),
        "author": { "@type": "Organization", "name": "RAIZON", "url": "https://raizon-okinawa.com" },
        "publisher": {
          "@type": "Organization",
          "name": "RAIZON",
          "logo": { "@type": "ImageObject", "url": "https://raizon-okinawa.com/apple-touch-icon.png" }
        },
        "mainEntityOfPage": { "@type": "WebPage", "@id": postUrl },
        "url": postUrl
      });
      document.head.appendChild(jsonLd);

      // BreadcrumbList構造化データを動的に注入
      const breadcrumbLd = document.createElement('script');
      breadcrumbLd.type = 'application/ld+json';
      breadcrumbLd.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "ホーム", "item": "https://raizon-okinawa.com/" },
          { "@type": "ListItem", "position": 2, "name": "ブログ", "item": "https://raizon-okinawa.com/blog-list" },
          { "@type": "ListItem", "position": 3, "name": post.title, "item": postUrl }
        ]
      });
      document.head.appendChild(breadcrumbLd);

      // 記事表示
      container.innerHTML = `
        <div class="post-breadcrumb">
          <a href="index.html">ホーム</a>
          <span class="bc-sep">/</span>
          <a href="blog-list.html">ブログ</a>
          <span class="bc-sep bc-title-sep">/</span>
          <span class="bc-title">${post.title}</span>
        </div>

        ${post.thumbnail ? `<img class="post-thumb" src="${post.thumbnail}" alt="${post.title}">` : ''}

        <div class="post-meta">
          <span class="blog-card-cat">${post.category || 'お知らせ'}</span>
          <time style="font-size:0.85rem;color:var(--text-light);">${BlogCMS.formatDate(post.createdAt)}</time>
        </div>

        <h1 class="post-title">${post.title}</h1>

        <div class="post-body-wrap">
          ${post.body}
        </div>

        <div class="post-back">
          <a href="blog-list.html" class="btn btn-primary">← ブログ一覧へ</a>
          <a href="index.html" class="btn-outline-dark">トップへ戻る</a>
        </div>
      `;
    })();
  </script>
